name: Verify Compile

on:
  push:
    branches:
      - master
  workflow_dispatch:

# Cancel các workflow cũ khi có build mới
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout (Optimized)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 1.5. Clean up runner disk space 🧹
        run: |
          echo "Disk space before cleanup:"
          df -h

          # Xóa các gói cài đặt sẵn không cần thiết (song song để nhanh hơn)
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /usr/local/lib/android/sdk/build-tools/30.0.3 &
          wait

          # Dọn dẹp cache
          sudo apt-get clean
          docker system prune -a -f

          echo "Disk space after cleanup:"
          df -h

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 3. Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: 4. Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 5. Get Flutter dependencies
        run: flutter pub get & flutter doctor

      - name: 6. Build APK
        run: cd example && flutter build apk

      - name: 7. Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: example/build/app/outputs/flutter-apk/app-release.apk

      - name: 8. Get version from pubspec.yaml
        if: github.ref == 'refs/heads/master'
        id: version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
          if [[ $VERSION != *"+"* ]]; then
            # Nếu chưa có build number (+), mặc định thêm +1
            NEW_VERSION="${VERSION}+1"
          else
            # Nếu đã có build number, tăng lên 1
            BASE_VER=$(echo "$VERSION" | cut -d'+' -f1)
            BUILD_NUM=$(echo "$VERSION" | cut -d'+' -f2)
            NEW_BUILD_NUM=$((BUILD_NUM + 1))
            NEW_VERSION="${BASE_VER}+${NEW_BUILD_NUM}"
          fi
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: 9. Create GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: example/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true

  build_ios:
    runs-on: macos-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 2. Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 3. Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: 4. Build iOS
        run: cd example && flutter build ios --no-codesign
